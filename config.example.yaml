providers:
  llm:
    provider: openrouter
    model: anthropic/claude-haiku-4-5
    api_key: env:OPENROUTER_API_KEY
    # Local alternatives:
    # provider: ollama
    # model: llama3.2
    # base_url: http://localhost:11434
  tts:
    provider: elevenlabs
    api_key: env:ELEVENLABS_API_KEY
    voice_id: 21m00Tcm4TlvDq8ikWAM  # Rachel — swap for your preferred voice
    # Local alternative:
    # provider: kokoro
  visuals:
    provider: pexels
    pexels_api_key: env:PEXELS_API_KEY
    # GPU alternatives:
    # provider: flux
    # provider: animatediff
  renderer:
    provider: ffmpeg  # CPU-only, works on any server

output:
  format: "9x16"
  resolution: "1080x1920"
  target_duration_seconds: 30  # ad format — 15–30s

brands_dir: ./brands
projects_dir: ./projects
